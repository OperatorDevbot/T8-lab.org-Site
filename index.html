<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>homelab</title>
  <style>
    @font-face {
      font-family: 'GeistPixelCircle';
      src: url('fonts/GeistPixel-Circle.woff2') format('woff2');
    }
    @font-face {
      font-family: 'GeistPixelTriangle';
      src: url('fonts/GeistPixel-Triangle.woff2') format('woff2');
    }
    @font-face {
      font-family: 'DepartureMono';
      src: url('fonts/DepartureMono-Regular.woff2') format('woff2');
    }
    @font-face {
      font-family: 'GeistMono';
      src: url('fonts/GeistMono-Regular.woff2') format('woff2');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #111111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: none;
    }

    /* ── CUSTOM CURSOR ── */
    .cursor {
      position: fixed;
      width: 8px;
      height: 8px;
      background: #ff0000;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      mix-blend-mode: difference;
      transform: translate(-50%, -50%);
    }

    .cursor-trail {
      position: fixed;
      width: 32px;
      height: 32px;
      border: 1px solid rgba(255, 0, 0, 0.4);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%, -50%);
      transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }

    /* ── MAIN TEXT ── */
    .title {
      font-family: 'GeistPixelCircle', monospace;
      font-size: 8rem;
      color: #ffffff;
      letter-spacing: -0.05em;
      line-height: 1;
      user-select: none;
    }

    .title .eight {
      font-family: 'GeistPixelTriangle', monospace;
      color: #ff0000;
      display: inline-block;
      animation: glitch 8s infinite;
    }

    @keyframes glitch {
      0%, 96%, 100% {
        transform: translate(0);
        filter: none;
      }
      97% {
        transform: translate(-2px, 1px);
        filter: drop-shadow(2px 0 #ff0000) drop-shadow(-2px 0 #00ffff);
      }
      98% {
        transform: translate(2px, -1px);
        filter: drop-shadow(-2px 0 #ff0000) drop-shadow(2px 0 #00ffff);
      }
      99% {
        transform: translate(0);
        filter: none;
      }
    }

    .site-footer,
    .site-footer * {
      font-family: 'GeistPixelCircle', monospace !important;
    }

    .site-footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      color: #555555;
    }

    .site-footer__content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      padding: 0.9rem 1.75rem 1.1rem;
      font-size: 0.8rem;
      text-align: center;
    }

    .red { color: #ff0000; }
    .dot { color: #444444; margin: 0 0.5rem; }
  </style>
</head>
<body>

  <div class="cursor" id="cursor"></div>
  <div class="cursor-trail" id="cursor-trail"></div>

  <p class="title">T<span class="eight">8</span></p>

  <footer class="site-footer">
    <div class="site-footer__content">
      <span>Your current ip is: <span class="red" id="ip-value">...</span></span>
      <span>© T<span class="red">8</span>-Lab <span class="dot">·</span> OperatorDevbot</span>
    </div>
  </footer>

  <script>
    const cursor = document.getElementById('cursor');
    const trail = document.getElementById('cursor-trail');

    let mouseX = 0, mouseY = 0;
    let cursorX = 0, cursorY = 0;
    let trailX = 0, trailY = 0;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animate() {
      cursorX += (mouseX - cursorX) * 0.15;
      cursorY += (mouseY - cursorY) * 0.15;
      trailX += (mouseX - trailX) * 0.08;
      trailY += (mouseY - trailY) * 0.08;

      cursor.style.left = cursorX + 'px';
      cursor.style.top = cursorY + 'px';
      trail.style.left = trailX + 'px';
      trail.style.top = trailY + 'px';

      requestAnimationFrame(animate);
    }
    animate();

    fetch('https://api.ipify.org?format=json')
      .then(r => r.json())
      .then(d => { document.getElementById('ip-value').textContent = d.ip; })
      .catch(() => { document.getElementById('ip-value').textContent = 'unavailable'; });
  </script>

</body>
</html>
